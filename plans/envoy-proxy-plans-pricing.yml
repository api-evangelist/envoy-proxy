specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Envoy Proxy
providerId: envoy-proxy
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Gateways
  - Proxies
  - Service Mesh
  - Open Source
description: Envoy Proxy is a Cloud Native Computing Foundation (CNCF) graduated open-source project licensed
  under Apache 2.0. It is self-hosted infrastructure software with no commercial pricing, no managed-service
  tier, and no metered API offering from the Envoy project itself. Any pricing seen in association with
  Envoy comes from third-party vendors (Tetrate, Solo.io, Ambassador, etc.) that distribute or operate
  Envoy-based products on their own commercial terms.
sources:
  - https://www.envoyproxy.io/
  - https://www.cncf.io/projects/envoy/
notes: No public pricing exists for Envoy Proxy itself; it is freely downloadable open-source software.
  Pricing for hosted/commercial Envoy distributions must be reconciled against the specific vendor (e.g.
  Tetrate, Solo.io) rather than the upstream project.
plans:
  - id: envoy-proxy-open-source
    name: Open Source
    type: freemium
    description: Envoy Proxy distributed under the Apache 2.0 license. Self-hosted, no usage fees, community
      support via GitHub and Slack.
    entries:
      - label: Software license
        name: license
        type: flat
        metric: license
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Apache 2.0 license
      - name: Community support (GitHub, CNCF Slack)
      - name: Public documentation
      - name: All Envoy APIs (Admin, xDS, RLS, HDS, ALS, ext_proc, ext_authz, Metrics, Tap)
maintainers:
