naftiko: 1.0.0-alpha2
info:
  label: Envoy Proxy xDS Discovery API — Secret Discovery
  description: 'Envoy Proxy xDS Discovery API — Secret Discovery. 1 operations. Lead operation: Envoy Proxy Secret Discovery
    Service (SDS). Self-contained Naftiko capability covering one Envoy Proxy business surface.'
  tags:
  - Envoy Proxy
  - Secret Discovery
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVOY_PROXY_API_KEY: ENVOY_PROXY_API_KEY
capability:
  consumes:
  - type: http
    namespace: xds-discovery-secret-discovery
    baseUri: http://localhost:18000
    description: Envoy Proxy xDS Discovery API — Secret Discovery business capability. Self-contained, no shared references.
    resources:
    - name: v3-discovery:secrets
      path: /v3/discovery:secrets
      operations:
      - name: discoversecrets
        method: POST
        description: Envoy Proxy Secret Discovery Service (SDS)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: xds-discovery-secret-discovery-rest
    port: 8080
    description: REST adapter for Envoy Proxy xDS Discovery API — Secret Discovery. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v3/discovery-secrets
      name: v3-discovery-secrets
      description: REST surface for v3-discovery:secrets.
      operations:
      - method: POST
        name: discoversecrets
        description: Envoy Proxy Secret Discovery Service (SDS)
        call: xds-discovery-secret-discovery.discoversecrets
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: xds-discovery-secret-discovery-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envoy Proxy xDS Discovery API — Secret Discovery. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: envoy-proxy-secret-discovery-service
      description: Envoy Proxy Secret Discovery Service (SDS)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: xds-discovery-secret-discovery.discoversecrets
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
