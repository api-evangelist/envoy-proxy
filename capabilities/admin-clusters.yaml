naftiko: 1.0.0-alpha2
info:
  label: Envoy Proxy Admin API — Clusters
  description: 'Envoy Proxy Admin API — Clusters. 1 operations. Lead operation: Envoy Proxy Get Cluster Information. Self-contained
    Naftiko capability covering one Envoy Proxy business surface.'
  tags:
  - Envoy Proxy
  - Clusters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVOY_PROXY_API_KEY: ENVOY_PROXY_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-clusters
    baseUri: http://localhost:9901
    description: Envoy Proxy Admin API — Clusters business capability. Self-contained, no shared references.
    resources:
    - name: clusters
      path: /clusters
      operations:
      - name: getclusters
        method: GET
        description: Envoy Proxy Get Cluster Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
          description: Output format for cluster information.
  exposes:
  - type: rest
    namespace: admin-clusters-rest
    port: 8080
    description: REST adapter for Envoy Proxy Admin API — Clusters. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/clusters
      name: clusters
      description: REST surface for clusters.
      operations:
      - method: GET
        name: getclusters
        description: Envoy Proxy Get Cluster Information
        call: admin-clusters.getclusters
        with:
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-clusters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envoy Proxy Admin API — Clusters. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: envoy-proxy-get-cluster-information
      description: Envoy Proxy Get Cluster Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-clusters.getclusters
      with:
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
