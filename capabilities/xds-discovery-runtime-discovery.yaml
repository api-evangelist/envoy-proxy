naftiko: 1.0.0-alpha2
info:
  label: Envoy Proxy xDS Discovery API — Runtime Discovery
  description: 'Envoy Proxy xDS Discovery API — Runtime Discovery. 1 operations. Lead operation: Envoy Proxy Runtime Discovery
    Service (RTDS). Self-contained Naftiko capability covering one Envoy Proxy business surface.'
  tags:
  - Envoy Proxy
  - Runtime Discovery
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVOY_PROXY_API_KEY: ENVOY_PROXY_API_KEY
capability:
  consumes:
  - type: http
    namespace: xds-discovery-runtime-discovery
    baseUri: http://localhost:18000
    description: Envoy Proxy xDS Discovery API — Runtime Discovery business capability. Self-contained, no shared references.
    resources:
    - name: v3-discovery:runtime
      path: /v3/discovery:runtime
      operations:
      - name: discoverruntime
        method: POST
        description: Envoy Proxy Runtime Discovery Service (RTDS)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: xds-discovery-runtime-discovery-rest
    port: 8080
    description: REST adapter for Envoy Proxy xDS Discovery API — Runtime Discovery. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v3/discovery-runtime
      name: v3-discovery-runtime
      description: REST surface for v3-discovery:runtime.
      operations:
      - method: POST
        name: discoverruntime
        description: Envoy Proxy Runtime Discovery Service (RTDS)
        call: xds-discovery-runtime-discovery.discoverruntime
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: xds-discovery-runtime-discovery-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envoy Proxy xDS Discovery API — Runtime Discovery. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: envoy-proxy-runtime-discovery-service
      description: Envoy Proxy Runtime Discovery Service (RTDS)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: xds-discovery-runtime-discovery.discoverruntime
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
