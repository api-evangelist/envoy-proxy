naftiko: 1.0.0-alpha2
info:
  label: Envoy Proxy Admin API — Configuration
  description: 'Envoy Proxy Admin API — Configuration. 2 operations. Lead operation: Envoy Proxy Dump Current Configuration.
    Self-contained Naftiko capability covering one Envoy Proxy business surface.'
  tags:
  - Envoy Proxy
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVOY_PROXY_API_KEY: ENVOY_PROXY_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-configuration
    baseUri: http://localhost:9901
    description: Envoy Proxy Admin API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: config_dump
      path: /config_dump
      operations:
      - name: getconfigdump
        method: GET
        description: Envoy Proxy Dump Current Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resource
          in: query
          type: string
          description: Filter the configuration dump to only return the specified resource type.
        - name: mask
          in: query
          type: string
          description: Field mask to apply to the configuration dump, limiting which fields are returned.
        - name: name_regex
          in: query
          type: string
          description: Regular expression to filter the returned configuration by resource name.
        - name: include_eds
          in: query
          type: boolean
          description: Include EDS configuration in the dump.
    - name: init_dump
      path: /init_dump
      operations:
      - name: getinitdump
        method: GET
        description: Envoy Proxy Dump Initialization Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mask
          in: query
          type: string
          description: Field mask to apply to the initialization dump.
  exposes:
  - type: rest
    namespace: admin-configuration-rest
    port: 8080
    description: REST adapter for Envoy Proxy Admin API — Configuration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/config-dump
      name: config-dump
      description: REST surface for config_dump.
      operations:
      - method: GET
        name: getconfigdump
        description: Envoy Proxy Dump Current Configuration
        call: admin-configuration.getconfigdump
        with:
          resource: rest.resource
          mask: rest.mask
          name_regex: rest.name_regex
          include_eds: rest.include_eds
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/init-dump
      name: init-dump
      description: REST surface for init_dump.
      operations:
      - method: GET
        name: getinitdump
        description: Envoy Proxy Dump Initialization Configuration
        call: admin-configuration.getinitdump
        with:
          mask: rest.mask
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envoy Proxy Admin API — Configuration. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: envoy-proxy-dump-current-configuration
      description: Envoy Proxy Dump Current Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-configuration.getconfigdump
      with:
        resource: tools.resource
        mask: tools.mask
        name_regex: tools.name_regex
        include_eds: tools.include_eds
      outputParameters:
      - type: object
        mapping: $.
    - name: envoy-proxy-dump-initialization-configuration
      description: Envoy Proxy Dump Initialization Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-configuration.getinitdump
      with:
        mask: tools.mask
      outputParameters:
      - type: object
        mapping: $.
