naftiko: 1.0.0-alpha2
info:
  label: Envoy Proxy xDS Discovery API — Cluster Discovery
  description: 'Envoy Proxy xDS Discovery API — Cluster Discovery. 1 operations. Lead operation: Envoy Proxy Cluster Discovery
    Service (CDS). Self-contained Naftiko capability covering one Envoy Proxy business surface.'
  tags:
  - Envoy Proxy
  - Cluster Discovery
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ENVOY_PROXY_API_KEY: ENVOY_PROXY_API_KEY
capability:
  consumes:
  - type: http
    namespace: xds-discovery-cluster-discovery
    baseUri: http://localhost:18000
    description: Envoy Proxy xDS Discovery API — Cluster Discovery business capability. Self-contained, no shared references.
    resources:
    - name: v3-discovery:clusters
      path: /v3/discovery:clusters
      operations:
      - name: discoverclusters
        method: POST
        description: Envoy Proxy Cluster Discovery Service (CDS)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: xds-discovery-cluster-discovery-rest
    port: 8080
    description: REST adapter for Envoy Proxy xDS Discovery API — Cluster Discovery. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v3/discovery-clusters
      name: v3-discovery-clusters
      description: REST surface for v3-discovery:clusters.
      operations:
      - method: POST
        name: discoverclusters
        description: Envoy Proxy Cluster Discovery Service (CDS)
        call: xds-discovery-cluster-discovery.discoverclusters
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: xds-discovery-cluster-discovery-mcp
    port: 9090
    transport: http
    description: MCP adapter for Envoy Proxy xDS Discovery API — Cluster Discovery. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: envoy-proxy-cluster-discovery-service
      description: Envoy Proxy Cluster Discovery Service (CDS)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: xds-discovery-cluster-discovery.discoverclusters
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
